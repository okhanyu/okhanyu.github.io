<!doctype html>
<html lang=zh-cn>
<head>
  <meta charset=utf-8>
  <meta name=viewport content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover,shrink-to-fit=no">
    <title>即将访问新页面</title>
    <script type="text/javascript">
      function getParam(name) {
          var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");　　 
          var r = location.search.substr(1).match(reg);　　
          if (r != null) return decodeURI(decodeURI(r[2]));
      };
      function init() {
        var url = getParam("url");
        var link = document.getElementById("jump");
        link.href = url;
        link.text = url;
        //link.click();
      }

      window.onload=function(){init()};
      
    </script>
  </head>
  <body>
    <br> 
    点击前往：<a id="jump"></a>
  </body>
</html>
